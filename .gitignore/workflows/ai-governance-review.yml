name: ai-governance-review

on:
  push:
    paths:
      - 'agents/**'
      - 'instructions/**'
      - 'skills/**'
      - 'hooks/**'
      - 'workflows/**'
      - '.gitignore/Agents/**'
      - '.gitignore/Instructions/**'
      - '.gitignore/Skills/**'
      - '.gitignore/Hooks/**'
      - '.gitignore/Workflows/**'
  pull_request:
    paths:
      - 'agents/**'
      - 'instructions/**'
      - 'skills/**'
      - 'hooks/**'
      - 'workflows/**'
      - '.gitignore/Agents/**'
      - '.gitignore/Instructions/**'
      - '.gitignore/Skills/**'
      - '.gitignore/Hooks/**'
      - '.gitignore/Workflows/**'

jobs:
  review-ai-system-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review changed AI system files
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const github = require('@actions/github');

            const isPR = context.eventName === 'pull_request';
            let files = [];

            if (isPR) {
              const response = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              files = response.data.map(file => file.filename);
            } else {
              const added = (context.payload.commits || []).flatMap(commit => commit.added || []);
              const modified = (context.payload.commits || []).flatMap(commit => commit.modified || []);
              files = [...new Set([...added, ...modified])];
            }

            const reviewTargets = files.filter(file => {
              return [
                /^agents\/.+\.md$/,
                /^instructions\/.+\.md$/,
                /^skills\/.+\/SKILL\.md$/,
                /^hooks\/.+/,
                /^workflows\/.+\.md$/,
                /^\.gitignore\/Agents\/.+\.md$/,
                /^\.gitignore\/Instructions\/.+\.md$/,
                /^\.gitignore\/Skills\/.+\.md$/,
                /^\.gitignore\/Hooks\/.+/,
                /^\.gitignore\/Workflows\/.+\.md$/,
              ].some(pattern => pattern.test(file));
            });

            if (!reviewTargets.length) {
              core.info('No AI system files changed.');
              return;
            }

            const suggestions = reviewTargets.map(file => {
              return [
                `### Review Target: \`${file}\``,
                '- Verify YAML frontmatter exists and is valid.',
                '- Confirm exactly 3 tags are present if this is an agent/instruction/skill spec.',
                '- Check whether the file duplicates an existing capability.',
                '- Ensure ownership, purpose, responsibilities, and recommended use are clearly defined.',
                '- Confirm formatting is professional, structured, and implementation-ready.',
                '- Validate workflow alignment, automation logic, and governance coverage where applicable.',
                '- Suggest improvements for missing validation logic, weak sections, or unclear execution behavior.'
              ].join('\n');
            }).join('\n\n');

            const body = [
              '## AI System Review Suggestions',
              '',
              'The following newly added or updated repository AI system files should be reviewed for quality, structure, and governance compliance.',
              '',
              suggestions,
              '',
              '### Global Review Checklist',
              '- Check for duplication before approving.',
              '- Improve existing systems before creating new ones where possible.',
              '- Reject undocumented, weakly structured, or placeholder-style files.',
              '- Ensure outputs are reusable, scalable, and maintainable.',
            ].join('\n');

            if (isPR) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            } else {
              await core.summary
                .addHeading('AI System Review Suggestions')
                .addRaw(body)
                .write();
            }

      - name: Complete workflow
        run: echo "AI governance review completed."
